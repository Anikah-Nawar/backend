<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Register</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="container">
    <h2 id="form-title">Login</h2>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button id="submit-btn">Login</button>
    <button id="google-login">Sign in with Google</button>
    <p>
      <span id="toggle-text">Don't have an account?</span>
      <button id="toggle">Register</button>
    </p>
    <p id="message" style="color:red;"></p>
  </div>

  <!-- Firebase SDKs -->
  <script type="module">
    // Import Firebase SDKs
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      createUserWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider,
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

   const firebaseConfig = {
        apiKey: "AIzaSyCbyZFQSYr3E_0CM46eMQCMm7pEelkADrE",
        authDomain: "dashboard-ec3dc.firebaseapp.com",
        projectId: "dashboard-ec3dc",
        storageBucket: "dashboard-ec3dc.firebasestorage.app",
        messagingSenderId: "684313425979",
        appId: "1:684313425979:web:1e95f01ccf86d1f681c41e"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit-btn');
    const googleBtn = document.getElementById('google-login');
    const toggle = document.getElementById('toggle');
    const formTitle = document.getElementById('form-title');
    const toggleText = document.getElementById('toggle-text');
    const message = document.getElementById('message');
    
    let isLogin = true;

    toggle.addEventListener('click', () => {
      isLogin = !isLogin;
      formTitle.textContent = isLogin ? 'Login' : 'Register';
      submitBtn.textContent = isLogin ? 'Login' : 'Register';
      toggleText.textContent = isLogin ? "Don't have an account?" : "Already have an account?";
      toggle.textContent = isLogin ? "Register" : "Login";
      message.textContent = '';
    });

    submitBtn.addEventListener('click', async () => {
      const email = emailInput.value;
      const password = passwordInput.value;
      message.textContent = '';

      try {
        if (isLogin) {
          await signInWithEmailAndPassword(auth, email, password);
        } else {
          await createUserWithEmailAndPassword(auth, email, password);
        }
        window.location.href = "dashboard.html"; // Redirect to dashboard
      } catch (error) {
        message.textContent = error.message;
      }
    });

    googleBtn.addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, provider);
        window.location.href = "dashboard.html";
      } catch (error) {
        message.textContent = error.message;
      }
    });

    // Automatically redirect if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
